name: Polymarket_Bot_Run

on:
  push:                # 當你 push 程式碼到 git 時觸發
  # schedule:
   #  - cron: '*/30 * * * *' # 每 30 分鐘自動執行一次 (可調整)
  workflow_dispatch:   # 允許你手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 加入這行強制升級環境，消滅警告
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas  # 這裡填入你的 Main.py 需要的套件

      - name: Run Bot
        env:
          # 這裡設定環境變數，讓程式抓得到 Secret
          MY_PRIVATE_KEY: ${{ secrets.MY_PRIVATE_KEY }}
        run: python Main.py
